# Template and reference for a Prow periodic job. Merge the periodics entry into the
# correct file under the openshift/release repository (for example alongside other
# agent: kubernetes periodics for your component).
#
# Before the job can run, create these secrets on the CI cluster (adjust namespaces
# and keys to match your Prow deployment conventions):
#   firewatch-vault-token: key "token" holds the Vault token value.
#   firewatch-slack-webhook: key "url" holds the Slack incoming webhook URL.
#
# Update extra_refs so org, repo, and base_ref match the repository that contains
# check-token-expiry.py. With decorate: true, the job cwd is that repo root.

periodics:
- agent: kubernetes
  name: periodic-firewatch-token-expiry-check
  cron: "0 8 * * *"
  decorate: true
  labels:
    ci.openshift.io/area: firewatch
  annotations:
    description: >-
      Daily Firewatch Vault token expiry check; notifies Slack channel
      #ocp-ci-firewatch-tool via webhook on failure or expired token (exit 2).
  extra_refs:
  - base_ref: main
    org: openshift
    repo: firewatch
  spec:
    containers:
    - name: token-expiry-check
      image: python:3.12-slim
      env:
      - name: VAULT_ADDR
        value: "https://vault.ci.openshift.org"
      - name: VAULT_TOKEN
        valueFrom:
          secretKeyRef:
            name: firewatch-vault-token
            key: token
      - name: SLACK_WEBHOOK_URL
        valueFrom:
          secretKeyRef:
            name: firewatch-slack-webhook
            key: url
      command:
      - /bin/bash
      - -c
      - |
        set -euo pipefail
        pip install --no-cache-dir -q hvac requests
        python check-token-expiry.py
      resources:
        requests:
          cpu: 100m
          memory: 256Mi
    restartPolicy: Never
